<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Parle pour moi - 6 Langues</title>
  <style>
    body { text-align: center; font-family: Arial; margin-top: 30px; background: linear-gradient(#e3f2fd, #bbdefb); }
    #texte { font-size: 38px; margin: 20px; color: #111; min-height: 120px; background: white; padding: 20px; border-radius: 15px; }
    button, select { font-size: 18px; padding: 15px 25px; border-radius: 12px; border: none; background: #1565c0; color: white; cursor: pointer; margin: 8px; font-weight: bold; }
    button:hover { background: #0d47a1; }
  </style><link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4F46E5">
</head>
<body>
  <h1>🎤 App Accessibilité RDC</h1>

  <label><b>Choisir la langue / Pona mingi / Chagua lugha:</b> </label>
  <select id="langue">
    <option value="ln-CG">1. Lingala</option>
    <option value="sw-KE">2. Swahili</option>
    <option value="kg-CG">3. Kikongo</option>
    <option value="lu-CD">4. Tshiluba</option>
    <option value="fr-FR">5. Français</option>
    <option value="en-US">6. Anglais</option>
  </select>
  <br>

  <button id="btnParler">🎤 Appuie et Parle</button>
  <button id="btnLire">🔊 Lire le texte</button>
  <button id="btnEffacer">🗑️ Effacer</button>
  <p id="texte">Sélectionne ta langue et commence à parler</p>

<script>
const btnParler = document.getElementById('btnParler');
const btnLire = document.getElementById('btnLire');
const btnEffacer = document.getElementById('btnEffacer');
const texte = document.getElementById('texte');
const langue = document.getElementById('langue');

const reco = new webkitSpeechRecognition();
reco.continuous = false;
reco.interimResults = false;

btnParler.onclick = () => {
  reco.lang = langue.value;
  reco.start();
  btnParler.innerText = "👂 J'écoute...";
}

reco.onresult = (e) => {
  texte.innerText = e.results[0][0].transcript;
  btnParler.innerText = "🎤 Appuie et Parle";
}

reco.onerror = () => {
  btnParler.innerText = "🎤 Appuie et Parle";
  alert("Micro non détecté ou langue pas encore supportée pour parler. Mais la lecture marche!");
}

btnLire.onclick = () => {
  const speech = new SpeechSynthesisUtterance(texte.innerText);
  speech.lang = langue.value;
  speech.rate = 0.9; // un peu plus lent pour bien comprendre
  window.speechSynthesis.speak(speech);
}

btnEffacer.onclick = () => {
  texte.innerText = "";
}
</script>
</body>
</html>
